<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Odoo Cafe - Coffee Finder</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-color: #0b0f19;
      --card-bg: rgba(25, 30, 48, 0.65);
      --border-color: rgba(255, 255, 255, 0.08);
      --accent-color: #f59e0b; /* Amber */
      --accent-hover: #d97706;
      --text-main: #f3f4f6;
      --text-muted: #9ca3af;
      --text-error: #ef4444;
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow-x: hidden;
      background-image: 
        radial-gradient(at 0% 0%, rgba(245, 158, 11, 0.07) 0px, transparent 50%),
        radial-gradient(at 100% 100%, rgba(59, 130, 246, 0.05) 0px, transparent 50%);
    }

    .container {
      width: 100%;
      max-width: 520px;
      background: var(--card-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border-color);
      border-radius: 24px;
      padding: 40px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
      text-align: center;
      animation: fadeIn 0.6s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    h1 {
      font-size: 2.2rem;
      font-weight: 700;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #fff 0%, #a1a1aa 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
    }

    p.subtitle {
      color: var(--text-muted);
      font-size: 1rem;
      margin-bottom: 32px;
    }

    .search-box {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
    }

    input[type="text"] {
      flex: 1;
      background: rgba(17, 24, 39, 0.8);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 14px 18px;
      color: var(--text-main);
      font-family: inherit;
      font-size: 1rem;
      transition: var(--transition);
      outline: none;
    }

    input[type="text"]:focus {
      border-color: var(--accent-color);
      box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.2);
    }

    button {
      background: var(--accent-color);
      color: #000;
      border: none;
      border-radius: 12px;
      padding: 14px 28px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    button:hover {
      background: var(--accent-hover);
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(1px);
    }

    .image-frame {
      width: 100%;
      height: 280px;
      border-radius: 16px;
      overflow: hidden;
      background: rgba(17, 24, 39, 0.6);
      border: 1px solid var(--border-color);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .image-frame img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: opacity 0.5s ease-in-out, transform 0.5s ease;
      opacity: 0;
    }

    .image-frame img.loaded {
      opacity: 1;
    }

    .image-frame img:hover {
      transform: scale(1.03);
    }

    .status-msg {
      font-size: 0.95rem;
      min-height: 24px;
      margin-top: 10px;
      transition: var(--transition);
    }

    .status-success {
      color: #34d399;
    }

    .status-error {
      color: var(--text-error);
    }

    .placeholder-icon {
      position: absolute;
      font-size: 3rem;
      color: rgba(255, 255, 255, 0.15);
      pointer-events: none;
      transition: opacity 0.3s;
    }

    .placeholder-icon.hidden {
      opacity: 0;
    }

    /* Loader inside the frame */
    .spinner {
      position: absolute;
      width: 40px;
      height: 40px;
      border: 3px solid rgba(245, 158, 11, 0.2);
      border-top-color: var(--accent-color);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: none;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .suggested-pills {
      display: flex;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 16px;
    }

    .pill {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border-color);
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 0.85rem;
      color: var(--text-muted);
      cursor: pointer;
      transition: var(--transition);
    }

    .pill:hover {
      background: rgba(245, 158, 11, 0.15);
      border-color: var(--accent-color);
      color: var(--text-main);
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Odoo Cafe</h1>
    <p class="subtitle">Search the Coffee Directory</p>

    <div class="search-box">
      <input type="text" id="coffee-name-input" placeholder="Enter coffee name (e.g. Espresso, Latte...)" onkeydown="if(event.key === 'Enter') handleSearch()">
      <button onclick="handleSearch()">Search</button>
    </div>

    <div class="image-frame">
      <span id="placeholder-icon" class="placeholder-icon">☕</span>
      <div id="loader" class="spinner"></div>
      <img id="coffee-image" alt="Coffee Cup Preview">
    </div>

    <div id="status-msg" class="status-msg"></div>

    <div class="suggested-pills">
      <span class="pill" onclick="searchPill('Black Coffee')">Black Coffee</span>
      <span class="pill" onclick="searchPill('Latte')">Latte</span>
      <span class="pill" onclick="searchPill('Cappuccino')">Cappuccino</span>
      <span class="pill" onclick="searchPill('Americano')">Americano</span>
    </div>
  </div>

  <script>
    // Fallback coffee image (high quality Unsplash image of coffee cup on a table)
    const FALLBACK_IMAGE_URL = 'https://images.unsplash.com/photo-1509042239860-f550ce710b93?w=600&auto=format&fit=crop&q=80';

    async function updateCoffeeImage(coffeeName) {
      const imgElement = document.getElementById('coffee-image');
      const loader = document.getElementById('loader');
      const placeholder = document.getElementById('placeholder-icon');
      const statusMsg = document.getElementById('status-msg');

      if (!coffeeName || coffeeName.trim() === '') {
        showError('Please enter a coffee name.');
        return;
      }

      // Show loader, hide image and placeholder
      loader.style.display = 'block';
      imgElement.classList.remove('loaded');
      placeholder.classList.add('hidden');
      statusMsg.className = 'status-msg';
      statusMsg.textContent = '';

      try {
        const response = await fetch('https://api.sampleapis.com/coffee/hot');
        if (!response.ok) {
          throw new Error('API request failed with status: ' + response.status);
        }
        
        const data = await response.json();
        
        // Find matching coffee case-insensitively
        const searchName = coffeeName.trim().toLowerCase();
        const match = data.find(item => item.title.toLowerCase().includes(searchName) || searchName.includes(item.title.toLowerCase()));

        if (match && match.image) {
          // If match found, set the image src
          imgElement.src = match.image;
          imgElement.onload = () => {
            loader.style.display = 'none';
            imgElement.classList.add('loaded');
            showSuccess(`Found: ${match.title}`);
          };
          imgElement.onerror = () => {
            // Handle cases where the API returned a broken image URL
            useFallback('API image failed to load. Using fallback.');
          };
        } else {
          // No match found in the API list
          useFallback(`Coffee "${coffeeName}" not found. Showing default.`);
        }
      } catch (error) {
        console.error('Error fetching coffee image:', error);
        useFallback('Network error. Showing default coffee image.');
      }
    }

    function useFallback(message) {
      const imgElement = document.getElementById('coffee-image');
      const loader = document.getElementById('loader');
      const statusMsg = document.getElementById('status-msg');

      imgElement.src = FALLBACK_IMAGE_URL;
      imgElement.onload = () => {
        loader.style.display = 'none';
        imgElement.classList.add('loaded');
        showError(message);
      };
    }

    function showSuccess(msg) {
      const statusMsg = document.getElementById('status-msg');
      statusMsg.className = 'status-msg status-success';
      statusMsg.textContent = msg;
    }

    function showError(msg) {
      const statusMsg = document.getElementById('status-msg');
      statusMsg.className = 'status-msg status-error';
      statusMsg.textContent = msg;
    }

    function handleSearch() {
      const query = document.getElementById('coffee-name-input').value;
      updateCoffeeImage(query);
    }

    function searchPill(name) {
      document.getElementById('coffee-name-input').value = name;
      updateCoffeeImage(name);
    }
  </script>
</body>
</html>
